# Welcome Book content. Edit freely - admin edits are preserved when the plugin
# upgrades; new sections shipped by the plugin will be merged in automatically.
#
# - 'order' controls section order. Remove a section ID from this list to hide it.
# - Each section has 'heading' (auto-bolded at the top of its first page) and 'body'
#   (plain prose, auto word-wrapped into book pages).
# - 'requires' is optional. Omitted = always shown. May be a single config-flag name
#   or a list (all must be true). Names use the FLATTENED keys loaded into the
#   plugin's globalConfig (e.g. 'Messing', not 'Settings_Menu.Messing').

order:
  - welcome
  - settings
  - hydration
  - bladder_bowels
  - toilets
  - toilet_smarts
  - balance
