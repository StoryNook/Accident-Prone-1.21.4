# integrations.yml -- config for any feature that requires another plugin.
# If you do not run any of the integrations below, you can ignore this file.

enabled: false                  # master switch; nothing fires when off

Events:
  Caregiver:
    Min_Wetness: 30
    Min_Fullness: 30
    Feed_Below: 70
    Cooldown_Change_Seconds: 60
    Cooldown_Feed_Seconds: 120
    Cooldown_Equip_Seconds: 300
    Cooldown_Carry_Pickup_Seconds: 10
    Cooldown_Carry_Drop_Seconds: 10
    Cooldown_Highchair_Place_Seconds: 10
    Cooldown_Change_On_Table_Seconds: 60
    Cooldown_Stock_Changing_Table_Seconds: 1
  Crafter:
    Cooldown_Pail_Fill_Seconds: 30
    Cooldown_Wash_Pants_Seconds: 15
  Little:
    Cooldown_Toilet_Relief_Seconds: 90
    Cooldown_Accident_Handled_Seconds: 180
    Cooldown_Hydrate_Threshold_Seconds: 600
    Hydrate_Threshold: 80

