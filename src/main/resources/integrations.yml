    "accidentprone:craft_thick_diaper": "AccidentProne-CraftThickDiaper"
    "accidentprone:craft_crib": "AccidentProne-CraftCrib"
    "accidentprone:craft_washer": "AccidentProne-CraftWasher"
    "accidentprone:toilet_relief": "AccidentProne-ToiletRelief"
    "accidentprone:accident_handled": "AccidentProne-AccidentHandled"
    "accidentprone:hydrate_threshold": "AccidentProne-Hydrate"
    "accidentprone:carry_pickup": "AccidentProne-CarryPickup"
    "accidentprone:carry_drop": "AccidentProne-CarryDrop"
    "accidentprone:highchair_place": "AccidentProne-HighchairPlace"
