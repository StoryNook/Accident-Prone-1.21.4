# Nanny NPC chat messages, keyed by mood tier.
# Structure: <category>.<TIER>: [list of message strings]
# Tiers: SWEET, CARING, STRICT, WARDEN. CUSTOM falls back to CARING.
#
# Placeholders supported in any line:
#   {ward}  → ward's display name (third-person, e.g. "Steve")
#   {you}   → "you" (second-person)
#   {nanny} → Nanny's name
#   {biome} → ward's current biome, e.g. "jungle", "deep dark"
#   {time}  → "morning" / "afternoon" / "dusk" / "night"
#
# Authoring rule: vary {ward} / {you} / plain across each tier's list.
# Don't let either form dominate.

# --- Lifecycle ---

greeting:
  SWEET:
    - "There's my little angel! Did {you} miss Nanny?"
    - "Look who's awake! Come here, sweetheart."
    - "Hi {ward}! Nanny's so happy to see you."
    - "Welcome back, lovebug. Let me look at {you}."
    - "{ward}! You're home! Nanny's been waiting and waiting."
    - "Aww, there's my precious thing!"
  CARING:
    - "Welcome back, little one."
    - "Good to see {you}, {ward}. How was your adventure?"
    - "Come here, sweetie — let Nanny check on {you}."
    - "There you are, {ward}. Right on time."
    - "Welcome home. Did {you} have a nice morning?"
    - "Hello, dear. Nanny's been thinking about you."
  STRICT:
    - "Took {you} long enough."
    - "Back already? Stand still, let me look at {you}."
    - "About time, {ward}. We have things to do."
    - "Don't keep Nanny waiting next time."
    - "Here. Now. Let me see {you}."
