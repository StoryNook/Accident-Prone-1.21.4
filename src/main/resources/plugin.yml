name: Accident-Prone
main: com.storynook.Plugin
version: 1.2.5
api-version: 1.19
author: ["StoryNook"]
description: "Bladder, bowels, diapers and more tracking, and usage"
# softdepend: [Vault]
softdepend: [PlaceholderAPI, VentureChat, Citizens]
commands:
  settings:
    description: "Open player settings for SNDP"
  pee:
    desctription: "Allows the player to wet themselves"
  poop:
    description: "Allows the player to mess themselves"
  debug:
    description: "Used for debugging and testing. Admins & OP only"
  stats:
    description: "Shows the player's stats."
  check:
    description: "Shows Players Diaper Status"
  caregiver:
    description: "Manage your caregivers."
    usage: "/caregiver <add/remove/list> [player]"
  lockincon:
    description: "Used to lock a player's incontinance level"
    usage: "/lockincon <bladder|bowel|both> <Number> [player]"
  unlockincon:
    description: "Used to unlock a player's incontinance level"
    usage: "/unlockincon <bladder|bowel|both> [player]"
  minfill:
    description: "Used so players can set the min amount their stats need to be for a warning"
    usage: "/minfill <amount|help>"
  nightvision:
    description: "Toggles NightVision"
  nv:
    description: "Toggles NightVision"
  change:
    description: "NPC's ability to change a player"
  hypno:
    description: "Used for members to select the hypno trigger word they want"
  # laydown:
  #   description: "Allows the player to laydown"
  equiparmor:
    description: "Allows caregivers to equip littles with armor"
  diaperreload:
    description: "Reloads the Diaper plugin configuration and data"
  welcomebook:
    description: "Gives the player a newly generated WelcomeBook"
  nanny:
    description: "Nanny NPC management"
    usage: "/nanny <give|list|remove|info|settings|sethome|summon|reload>"
    permission: accidentprone.nanny.use
permissions:
  diaperplugin.reload:
    description: "Reloads the Diaper plugin configuration and data"
  diaperplugin.debug:
    description: "Permission to set bladder, bowels, and underwearType."
  diaperplugin.nightvision:
    description: "Allows the player to apply a nightvision effect"
    diaperplugin.selecthypno:
    description: "Allows the player to select what trigger word they want"